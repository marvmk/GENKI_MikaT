<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 2 - Flashcards</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 {
      perspective: 1000px;
    }
    .transform-style-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-teal-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki Lesson 2 Flashcards</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">Practice Kore/Sore/Are, Kono/Sono/Ano, Whose, and Prices</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('kore_sore')" id="tab-kore_sore" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-teal-600 text-white">
        Kore / Sore / Are
      </button>
      <button onclick="switchCategory('kono_sono')" id="tab-kono_sono" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-white text-teal-700 hover:bg-teal-50">
        Kono / Sono / Ano
      </button>
      <button onclick="switchCategory('whose_mo')" id="tab-whose_mo" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-white text-teal-700 hover:bg-teal-50">
        Whose & Particle 'mo'
      </button>
      <button onclick="switchCategory('prices')" id="tab-prices" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-white text-teal-700 hover:bg-teal-50">
        Prices & Shopping
      </button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Question: <span id="current-index" class="text-teal-600">1</span> / 17
    </div>

    <div class="w-full max-w-2xl h-[450px] relative perspective-1000">
      
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-teal-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">📱👉</div>
          <div id="card-en" class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-800 leading-snug">
            This is a smartphone.
          </div>
          <div class="text-xs text-teal-500 mt-8 font-semibold tracking-widest uppercase">Tap to see answer</div>
        </div>

        <div class="absolute w-full h-full bg-teal-50 rounded-3xl shadow-xl border-2 border-teal-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          
          <div id="card-en-back" class="text-xl md:text-2xl font-medium text-teal-800 pt-2">
            This is a smartphone.
          </div>

          <div class="flex flex-col gap-4 my-auto w-full px-2">
            <div id="card-kanji" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-wide">
              これはスマホです。
            </div>
            <div id="card-kana" class="text-2xl md:text-3xl text-teal-600 font-bold tracking-normal">
              これはすまほです。
            </div>
          </div>

          <div class="pb-2">
            <button onclick="speakText(event)" class="bg-teal-600 hover:bg-teal-700 active:scale-95 text-white p-5 rounded-full shadow-lg transition-all duration-200 flex items-center justify-center group" title="Listen">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 group-hover:animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
              </svg>
            </button>
          </div>
        </div>

      </div>

      <div id="result-screen" class="absolute inset-0 bg-white rounded-3xl shadow-2xl border-4 border-teal-500 p-8 flex flex-col justify-center items-center text-center hidden z-10">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-4xl md:text-5xl font-black text-teal-600 mb-2">Ottimo!</h2>
        <p class="text-2xl text-slate-600 mb-8 font-medium">You completed Lesson 2 items!</p>
        <button onclick="restartCategory()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold text-2xl px-8 py-4 rounded-full shadow-lg hover:shadow-xl transition-all active:scale-95">
          Restart
        </button>
      </div>

    </div>

    <div id="controls" class="flex items-center justify-center gap-6 mt-8 w-full max-w-md">
      <button onclick="prevCard()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95 disabled:opacity-30 disabled:pointer-events-none">
        ← Previous
      </button>
      <button onclick="nextCard()" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">
        Next →
      </button>
    </div>

  </main>

  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm border-t border-slate-700">
    &copy; FujiGreentea - Japanese Learning Materials (Genki I)
  </footer>

  <script>

        { icon: "👩🔑", en: "That is Mary's key.", kanji: "あれはメアリーさんの鍵です。", kana: "あれはめありーさんのかぎです。" },
        { icon: "❓🎒", en: "Whose bag is this?", kanji: "この鞄はだれのですか。", kana: "このかばんはだれのですか。" },
        { icon: "👨🎒", en: "That is Takeshi's.", kanji: "それはたけしさんのです。", kana: "それはたけしさんのです。" },
        { icon: "🇺🇸🤝", en: "Mary is an American. Robert is also an American.", kanji: "メアリーさんはアメリカ人です。ロバートさんもアメリカ人です。", kana: "めありーさんはあめりかじんです。ろばーとさんもあめりかじんです。" },
        { icon: "🎓🤝", en: "I am a student. Takeshi is also a student.", kanji: "私は学生です。たけしさんも学生です。", kana: "わたしはがくせいです。たけしさんもがくせいです。" },
        { icon: "💻🤝", en: "This is a computer. That is also a computer.", kanji: "これはコンピューターです。それもコンピューターです。", kana: "これはこんぴゅーたーです。それもこんぴゅーたーです。" },
        { icon: "🌸🤝", en: "Sakura University is a good school. Seoul University is also a good school.", kanji: "さくら大学はいい学校です。ソウル大学もいい学校です。", kana: "さくらだいがくはいいがっこうです。そうるだいがくもいいがっこうです。" },
        { icon: "🕒🤝", en: "My major is history. His major is also history.", kanji: "私の専攻は歴史です。彼の専攻も歴史です。", kana: "わたしのせんこうはれきしです。かれのせんこうもれきしです。" },
        { icon: "🎂🤝", en: "Sora is 20 years old. I am also 20 years old.", kanji: "ソラさんは二十歳です。私も二十歳です。", kana: "そらさんははたちです。わたしもはたちです。" },
        { icon: "📱🤝", en: "This is 10,000 yen. That is also 10,000 yen.", kanji: "これは一万円です。それも一万円です。", kana: "これはいちまんえんです。それもいちまんえんです。" },
        { icon: "❓🚲", en: "Whose bicycle is this?", kanji: "この自転車はだれのですか。", kana: "このじてんしゃはだれのですか。" },
        { icon: "👨‍🏫🚲", en: "It is Professor Yamashita's.", kanji: "山下先生のです。", kana: "やましたせんせいのです。" },
        { icon: "❓🌂", en: "Whose umbrella is that?", kanji: "その傘はだれのですか。", kana: "そのかさはだれのですか。" },
        { icon: "🇬🇧🤝", en: "Robert is British. His friend is also British.", kanji: "ロバートさんはイギリス人です。友達もイギリス人です。", kana: "ろばーとさんはいぎりすじんです。ともだちもいぎりすじんです。" }
      ],
      prices: [
        { icon: "💰❓", en: "How much is this?", kanji: "これはいくらですか。", kana: "これはいくらですか。" },
        { icon: "💴1️⃣", en: "It is 800 yen.", kanji: "八百円です。", kana: "はちひゃくえんです。" },

        { icon: "🎒💰", en: "How much is this bag?", kanji: "この鞄はいくらですか。", kana: "このかばんはいくらですか。" },

        { icon: "🛒👈", en: "Then, I will take that one (near you).", kanji: "じゃあ、それをください。", kana: "じゃあ、それをください。" },
        { icon: "🛒👇", en: "Then, I will take that one over there.", kanji: "じゃあ、あれをください。", kana: "じゃあ、あれをください。" },
        { icon: "💴6️⃣", en: "It is 100 yen.", kanji: "百円です。", kana: "ひゃくえんです。" },
        { icon: "💴7️⃣", en: "It is 600 yen.", kanji: "六百円です。", kana: "ろっぴゃくえんです。" },
        { icon: "💴8️⃣", en: "It is 8,000 yen.", kanji: "八千円です。", kana: "はっせんえんです。" },
        { icon: "💴9️⃣", en: "It is 90,000 yen.", kanji: "九万円です。", kana: "きゅうまんえんです。" }
      ]
    };

    let currentCategory = 'kore_sore';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category;
      currentIndex = 0;
      isFlipped = false;
      
      const categories = ['kore_sore', 'kono_sono', 'whose_mo', 'prices'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.classList.remove('bg-white', 'text-teal-700', 'hover:bg-teal-50');
          tab.classList.add('bg-teal-600', 'text-white');
        } else {
          tab.classList.remove('bg-teal-600', 'text-white');
          tab.classList.add('bg-white', 'text-teal-700', 'hover:bg-teal-50');
        }
      });

      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      
      updateCard();
    }

    function updateCard() {
      const card = document.getElementById('flashcard');
      card.classList.remove('rotate-y-180');
      isFlipped = false;

      const data = dataset[currentCategory][currentIndex];
      
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;

      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) {
        card.classList.add('rotate-y-180');
        isFlipped = true;
      } else {
        card.classList.remove('rotate-y-180');
        isFlipped = false;
      }
    }

    function nextCard() {
      if (currentIndex < 16) {
        currentIndex++;
        updateCard();
      } else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        updateCard();
      }
    }

    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      currentIndex = 0;
      updateCard();
    }

    function speakText(event) {
      event.stopPropagation();

      const data = dataset[currentCategory][currentIndex];
      const textToSpeak = data.kana;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(textToSpeak);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.85;

      window.speechSynthesis.speak(utterance);
    }

    window.onload = () => {
      updateCard();
    };
  </script>
</body>
</html>
