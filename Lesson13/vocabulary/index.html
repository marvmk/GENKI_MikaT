<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 13 Vocabulary - 100% Full Complete</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-indigo-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki L13 Vocab (55 Words Perfect)</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">100% Every Single Word from Lesson 13 List</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <!-- カテゴリー切り替えタブ -->
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('nouns1')" id="tab-nouns1" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white">Nouns: Life & Culture (15)</button>
      <button onclick="switchCategory('nouns2_verbs')" id="tab-nouns2_verbs" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Nouns 2 & Verbs (15)</button>
      <button onclick="switchCategory('adj_exp')" id="tab-adj_exp" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Adj & Expressions (15)</button>
      <button onclick="switchCategory('numbers')" id="tab-numbers" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Days Counter (10)</button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Word Count: <span id="current-index" class="text-indigo-600">1</span> / <span id="total-index">15</span>
    </div>

    <div class="w-full max-w-2xl h-[500px] relative perspective-1000">
      
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-indigo-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">💼</div>
          <div id="card-en" class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-800 leading-snug">part-time job</div>
          <div class="text-xs text-indigo-500 mt-8 font-semibold tracking-widest uppercase">Tap to see Japanese</div>
        </div>

        <div class="absolute w-full h-full bg-indigo-50 rounded-3xl shadow-xl border-2 border-indigo-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          <div class="w-full flex flex-col items-center pt-2 gap-1">
            <div id="card-en-back" class="text-xl md:text-2xl font-medium text-indigo-800">part-time job</div>
            <div id="card-type" class="text-xs px-3 py-1 bg-slate-100 text-slate-800 font-bold rounded-full uppercase tracking-wider">Noun</div>
          </div>

          <div class="flex flex-col gap-3 my-auto w-full px-2">
            <div id="card-kanji" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-wide">アルバイト</div>
            <div id="card-kana" class="text-2xl md:text-3xl text-indigo-600 font-bold">あるばいと</div>
            <div id="card-romaji" class="text-xl md:text-2xl text-amber-600 font-semibold italic">arubaito</div>
          </div>

          <div class="pb-2">
            <button onclick="speakText(event)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white p-5 rounded-full shadow-lg flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
          </div>
        </div>

      </div>

      <div id="result-screen" class="absolute inset-0 bg-white rounded-3xl shadow-2xl border-4 border-indigo-500 p-8 flex flex-col justify-center items-center text-center hidden z-10">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-4xl md:text-5xl font-black text-indigo-600 mb-2">Ottimo!</h2>
        <p class="text-2xl text-slate-600 mb-8 font-medium">You completed this vocabulary set!</p>
        <button onclick="restartCategory()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-2xl px-8 py-4 rounded-full shadow-lg active:scale-95">Restart</button>
      </div>

    </div>

    <div id="controls" class="flex items-center justify-center gap-6 mt-8 w-full max-w-md">
      <button onclick="prevCard()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">← Previous</button>
      <button onclick="nextCard()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">Next →</button>
    </div>

  </main>

  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm border-t border-slate-700">
    &copy; FujiGreentea - Japanese Vocabulary Master (Genki II)
  </footer>

  <script>
    const dataset = {
      nouns1: [
        { type: "Noun", icon: "💼", en: "part-time job", kanji: "アルバイト", kana: "あるばいと", romaji: "arubaito" },
        { type: "Noun", icon: "🧑‍💼", en: "adult", kanji: "大人", kana: "おとな", romaji: "otona" },
        { type: "Noun", icon: "⚖️", en: "lawyer", kanji: "弁護士", kana: "べんごし", romaji: "bengoshi" },
        { type: "Noun", icon: "🙋", en: "I (formal)", kanji: "私", kana: "わたくし", romaji: "watakushi" },
        { type: "Noun", icon: "🍛", en: "curry", kanji: "カレー", kana: "かれー", romaji: "karē" },
        { type: "Noun", icon: "☕", en: "black tea", kanji: "紅茶", kana: "こうちゃ", romaji: "kōcha" },
        { type: "Noun", icon: "👘", en: "kimono", kanji: "着物", kana: "きもの", romaji: "kimono" },
        { type: "Noun", icon: "🧶", en: "sweater", kanji: "セーター", kana: "せーたー", romaji: "sētā" },
        { type: "Noun", icon: "楽器", en: "musical instrument", kanji: "楽器", kana: "がっき", romaji: "gakki" },
        { type: "Noun", icon: "🥋", en: "karate", kanji: "空手", kana: "からて", romaji: "karate" },
        { type: "Noun", icon: "⛳", en: "golf", kanji: "ゴルフ", kana: "ごるふ", romaji: "gorufu" },
        { type: "Noun", icon: "🏍️", en: "motorcycle", kanji: "バイク", kana: "ばいく", romaji: "baiku" },
        { type: "Noun", icon: "象", en: "elephant", kanji: "象", kana: "ぞう", romaji: "zō" },
        { type: "Noun", icon: "🧍", en: "body", kanji: "体", kana: "からだ", romaji: "karada" },
        { type: "Noun", icon: "🌐", en: "foreign language", kanji: "外国語", kana: "がいこくご", romaji: "gaikokugo" }
      ],
      nouns2_verbs: [
        { type: "Noun", icon: "🗣️", en: "language / word", kanji: "言葉", kana: "ことば", romaji: "kotoba" },
        { type: "Noun", icon: "📝", en: "grammar", kanji: "文法", kana: "ぶんぽう", romaji: "bunpō" },
        { type: "Noun", icon: "📱", en: "application / app", kanji: "アプリ", kana: "あぷり", romaji: "apuri" },
        { type: "Noun", icon: "🏢", en: "apartment", kanji: "アパート", kana: "あぱーと", romaji: "apāto" },
        { type: "Noun", icon: "🏙️", en: "larger apartment / condo", kanji: "マンション", kana: "まんしょん", romaji: "manshon" },
        { type: "Noun", icon: "🛫", en: "airport", kanji: "空港", kana: "くうこう", romaji: "kūkō" },
        { type: "Noun", icon: "🏪", en: "shop / store", kanji: "店", kana: "みせ", romaji: "mise" },
        { type: "Noun", icon: "📈", en: "consumer prices", kanji: "物価", kana: "ぶっか", romaji: "bukka" },
        { type: "Noun", icon: "📰", en: "advertisement", kanji: "広告", kana: "こうこく", romaji: "kōkoku" },
        { type: "Noun", icon: "🙋", en: "recruitment", kanji: "募集", kana: "ぼしゅう", romaji: "boshū" },
        { type: "U-Verb", icon: "🧦", en: "to knit (~o)", kanji: "編む", kana: "あむ", romaji: "amu" },
        { type: "U-Verb", icon: "🔥", en: "to do one's best", kanji: "頑張る", kana: "がんばる", romaji: "ganbaru" },
        { type: "U-Verb", icon: "😭", en: "to cry", kanji: "泣く", kana: "なく", romaji: "naku" },
        { type: "U-Verb", icon: "🪥", en: "to brush (teeth) (~o)", kanji: "磨く", kana: "みがく", romaji: "migaku" },
        { type: "U-Verb", icon: "🤝", en: "to keep a promise", kanji: "約束を守る", kana: "やくそくをまもる", romaji: "yakusoku o mamoru" }
      ],
      adj_exp: [
        { type: "I-Adj", icon: "😄", en: "glad / happy", kanji: "嬉しい", kana: "うれしい", romaji: "ureshii" },
        { type: "I-Adj", icon: "😭", en: "sad", kanji: "悲しい", kana: "かなしい", romaji: "kanashii" },
        { type: "I-Adj", icon: "😣", en: "strict", kanji: "厳しい", kana: "きびしい", romaji: "kibishii" },
        { type: "I-Adj", icon: "🤢", en: "to feel sick", kanji: "気分が悪い", kana: "きぶんがわるい", romaji: "kibun ga warui" },
        { type: "I-Adj", icon: "🌶️", en: "hot and spicy / salty", kanji: "辛い", kana: "からい", romaji: "karai" },
        { type: "I-Adj", icon: "🤩", en: "incredible / awesome", kanji: "凄い", kana: "すごい", romaji: "sugoi" },
        { type: "I-Adj", icon: "📍", en: "close / near", kanji: "近い", kana: "ちかい", romaji: "chikai" },
        { type: "Na-Adj", icon: "🌈", en: "various", kanji: "色々（な）", kana: "いろいろ", romaji: "iroiro" },
        { type: "Na-Adj", icon: "🍀", en: "happy (lasting happiness)", kanji: "幸せ（な）", kana: "しあわせ", romaji: "shiawase" },
        { type: "Na-Adj", icon: "❌", en: "no good", kanji: "だめ（な）", kana: "だめ", romaji: "dame" },
        { type: "Irreg-Verb", icon: "💖", en: "to be moved / touched by (~ni)", kanji: "感動する", kana: "かんどうする", romaji: "kandō suru" },
        { type: "Expression", icon: "🔢", en: "... times", kanji: "〜回", kana: "〜かい", romaji: "... kai" },
        { type: "Expression", icon: "🛣️", en: "... kilometers / ... kilograms", kanji: "〜キロ", kana: "〜きろ", romaji: "... kiro" },
        { type: "Expression", icon: "🧮", en: "all", kanji: "全部", kana: "ぜんぶ", romaji: "zenbu" },
        { type: "Expression", icon: "⭐", en: "especially", kanji: "特に", kana: "とくに", romaji: "tokuni" }
      ],
      numbers: [
        { type: "Counter", icon: "1️⃣", en: "one day", kanji: "一日", kana: "いちにち", romaji: "ichinichi" },
        { type: "Counter", icon: "2️⃣", en: "two days", kanji: "二日", kana: "ふつか", romaji: "futsuka" },
        { type: "Counter", icon: "3️⃣", en: "three days", kanji: "三日", kana: "みっか", romaji: "mikka" },
        { type: "Counter", icon: "4️⃣", en: "four days", kanji: "四日", kana: "よっか", romaji: "yokka" },
        { type: "Counter", icon: "5️⃣", en: "five days", kanji: "五日", kana: "いつか", romaji: "itsuka" },
        { type: "Counter", icon: "6️⃣", en: "six days", kanji: "六日", kana: "むいか", romaji: "muika" },
        { type: "Counter", icon: "7️⃣", en: "seven days", kanji: "七日", kana: "なのか", romaji: "nanoka" },
        { type: "Counter", icon: "8️⃣", en: "eight days", kanji: "八日", kana: "ようか", romaji: "yōka" },
        { type: "Counter", icon: "9️⃣", en: "nine days", kanji: "九日", kana: "ここのか", romaji: "kokonoka" },
        { type: "Counter", icon: "🔟", en: "ten days", kanji: "十日", kana: "とおか", romaji: "tōka" }
      ]
    };

    let currentCategory = 'nouns1';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category;
      currentIndex = 0;
      isFlipped = false;
      
      const categories = ['nouns1', 'nouns2_verbs', 'adj_exp', 'numbers'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.classList.remove('bg-white', 'text-indigo-700', 'hover:bg-indigo-50');
          tab.classList.add('bg-indigo-600', 'text-white');
        } else {
          tab.classList.remove('bg-indigo-600', 'text-white');
          tab.classList.add('bg-white', 'text-indigo-700', 'hover:bg-indigo-50');
        }
      });

      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    }

    function updateCard() {
      const card = document.getElementById('flashcard');
      card.classList.remove('rotate-y-180');
      isFlipped = false;

      const data = dataset[currentCategory][currentIndex];
      
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;
      document.getElementById('card-romaji').innerText = data.romaji;
      document.getElementById('card-type').innerText = data.type;

      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) { card.classList.add('rotate-y-180'); isFlipped = true; }
      else { card.classList.remove('rotate-y-180'); isFlipped = false; }
    }

    function nextCard() {
      if (currentIndex < dataset[currentCategory].length - 1) {
        currentIndex++;
        updateCard();
      } else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }

    function prevCard() {
      if (currentIndex > 0) { currentIndex--; updateCard(); }
    }

    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      currentIndex = 0;
      updateCard();
    }

    function speakText(event) {
      event.stopPropagation();
      const data = dataset[currentCategory][currentIndex];
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(data.kana);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
    }

    window.onload = () => {
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    };
  </script>
</body>
</html>
