<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 14 Vocabulary App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-indigo-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki L14 Vocab (50 Items Perfect) 🍫</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">100% Every Single Word & Counter from Lesson 14</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('nouns1')" id="tab-nouns1" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white">Nouns: Family & Daily (16)</button>
      <button onclick="switchCategory('nouns2_verbs')" id="tab-nouns2_verbs" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Clothes & Verbs (14)</button>
      <button onclick="switchCategory('adj_exp')" id="tab-adj_exp" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Adj & Expressions (15)</button>
      <button onclick="switchCategory('counters')" id="tab-counters" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Counters (5)</button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Word Count: <span id="current-index" class="text-indigo-600">1</span> / <span id="total-index">16</span>
    </div>

    <div class="w-full max-w-2xl h-[500px] relative perspective-1000">
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <!-- 表 -->
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-indigo-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">👩</div>
          <div id="card-en" class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-800 leading-snug">(your/someone's) wife</div>
          <div class="text-xs text-indigo-500 mt-8 font-semibold tracking-widest uppercase">Tap to see Japanese</div>
        </div>

        <!-- 裏 -->
        <div class="absolute w-full h-full bg-indigo-50 rounded-3xl shadow-xl border-2 border-indigo-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          <div class="w-full flex flex-col items-center pt-2 gap-1">
            <div id="card-en-back" class="text-xl md:text-2xl font-medium text-indigo-800">wife</div>
            <div id="card-type" class="text-xs px-3 py-1 bg-slate-100 text-slate-800 font-bold rounded-full uppercase tracking-wider">Noun</div>
          </div>
          <div class="flex flex-col gap-3 my-auto w-full px-2">
            <div id="card-kanji" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-wide">奥さん</div>
            <div id="card-kana" class="text-2xl md:text-3xl text-indigo-600 font-bold">おくさん</div>
            <div id="card-romaji" class="text-xl md:text-2xl text-amber-600 font-semibold italic">okusan</div>
          </div>
          <div class="pb-2">
            <button onclick="speakText(event)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white p-5 rounded-full shadow-lg flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
          </div>
        </div>

      </div>

      <div id="result-screen" class="absolute inset-0 bg-white rounded-3xl shadow-2xl border-4 border-indigo-500 p-8 flex flex-col justify-center items-center text-center hidden z-10">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-4xl md:text-5xl font-black text-indigo-600 mb-2">Ottimo!</h2>
        <p class="text-2xl text-slate-600 mb-8 font-medium">You completed this vocabulary set!</p>
        <button onclick="restartCategory()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-2xl px-8 py-4 rounded-full shadow-lg active:scale-95">Restart</button>
      </div>
    </div>

    <div id="controls" class="flex items-center justify-center gap-6 mt-8 w-full max-w-md">
      <button onclick="prevCard()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">← Previous</button>
      <button onclick="nextCard()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">Next →</button>
    </div>

  </main>

  <script>
    const dataset = {
      nouns1: [
        { type: "Noun", icon: "👩", en: "(your/someone's) wife", kanji: "奥さん", kana: "おくさん", romaji: "okusan" },
        { type: "Noun", icon: "👨", en: "(your/someone's) husband", kanji: "ご主人", kana: "ごしゅじん", romaji: "goshujin" },
        { type: "Noun", icon: "🧑‍🤝‍🧑", en: "partner", kanji: "パートナー", kana: "ぱーとなー", romaji: "pātonā" },
        { type: "Noun", icon: "👴", en: "uncle; middle-aged man", kanji: "おじさん", kana: "おじさん", romaji: "ojisan" },
        { type: "Noun", icon: "👵", en: "aunt; middle-aged woman", kanji: "おばさん", kana: "おばさん", romaji: "obasan" },
        { type: "Noun", icon: "👨‍👩‍👧‍👦", en: "parents", kanji: "両親", kana: "りょうしん", romaji: "ryōshin" },
        { type: "Noun", icon: "🏠👵", en: "landlord; landlady", kanji: "大家さん", kana: "おおやさん", romaji: "ōyasan" },
        { type: "Noun", icon: "👥", en: "everyone; all of you", kanji: "皆さん", kana: "みなさん", romaji: "minasan" },
        { type: "Noun", icon: "🍫", en: "chocolate", kanji: "チョコレート", kana: "ちょこれーと", romaji: "chokorēto" },
        { type: "Noun", icon: "🍊", en: "mandarin orange", kanji: "みかん", kana: "みかん", romaji: "mikan" },
        { type: "Noun", icon: "💍", en: "ring", kanji: "指輪", kana: "ゆびわ", romaji: "yubiwa" },
        { type: "Noun", icon: "✏️", en: "pencil", kanji: "鉛筆", kana: "えんぴつ", romaji: "enpitsu" },
        { type: "Noun", icon: "🧸", en: "stuffed animal (e.g., teddy bear)", kanji: "ぬいぐるみ", kana: "ぬいぐるみ", romaji: "nuigurumi" },
        { type: "Noun", icon: "📚", en: "comic book", kanji: "漫画", kana: "まんが", romaji: "manga" },
        { type: "Noun", icon: "💄", en: "cosmetics", kanji: "化粧品", kana: "けしょうひん", romaji: "keshōhin" },
        { type: "Noun", icon: "📻", en: "radio", kanji: "ラジオ", kana: "らじお", romaji: "rajio" }
      ],
      nouns2_verbs: [
        { type: "Noun", icon: "🍽️", en: "plate; dish", kanji: "お皿", kana: "おさら", romaji: "osara" },
        { type: "Noun", icon: "📝", en: "résumé", kanji: "履歴書", kana: "りれきしょ", romaji: "rirekisho" },
        { type: "Noun", icon: "🎄", en: "Christmas", kanji: "クリスマス", kana: "くりすます", romaji: "kurisumasu" },
        { type: "Noun", icon: "💝", en: "Valentine's Day", kanji: "バレンタインデー", kana: "ばれんたいんでー", romaji: "barentaindē" },
        { type: "Noun", icon: "🤍", en: "White Day", kanji: "ホワイトデー", kana: "ほわいとでー", romaji: "howaitodē" },
        { type: "Noun", icon: "🧥", en: "sweatshirt", kanji: "トレーナー", kana: "とれーなー", romaji: "torēnā" },
        { type: "Noun", icon: "👕", en: "shirt", kanji: "シャツ", kana: "しゃつ", romaji: "shatsu" },
        { type: "Noun", icon: "👔", en: "necktie", kanji: "ネクタイ", kana: "ねくたい", romaji: "nekutai" },
        { type: "Noun", icon: "🧣", en: "winter scarf", kanji: "マフラー", kana: "まふらー", romaji: "mafurā" },
        { type: "U-Verb", icon: "✉️", en: "to send (person ni thing o)", kanji: "送る", kana: "おくる", romaji: "okuru" },
        { type: "U-Verb", icon: "🧥✨", en: "to look good (on somebody) (thing ga)", kanji: "似合う", kana: "にあう", romaji: "niau" },
        { type: "Ru-Verb", icon: "🏳️", en: "to give up (~o)", kanji: "あきらめる", kana: "あきらめる", romaji: "akirameru" },
        { type: "Ru-Verb", icon: "🎁➡", en: "to give (to others) (person ni thing o)", kanji: "あげる", kana: "あげる", romaji: "ageru" },
        { type: "Ru-Verb", icon: "⬅🎁", en: "to give (me) (person ni thing o)", kanji: "くれる", kana: "くれる", romaji: "kureru" }
      ],
      adj_exp: [
        { type: "Ru-Verb", icon: "✨", en: "to come into existence; to be made (~ga)", kanji: "できる", kana: "できる", romaji: "dekiru" },
        { type: "Irreg-Verb", icon: "💬🏼", en: "to consult (person ni)", kanji: "相談する", kana: "そうだんする", romaji: "sōdan suru" },
        { type: "Irreg-Verb", icon: "⚠️", en: "to give warning (person ni); to watch out (~o)", kanji: "注意する", kana: "ちゅういする", romaji: "chūi suru" },
        { type: "Irreg-Verb", icon: "💍💒", en: "to propose marriage (person ni)", kanji: "プロポーズする", kana: "ぷろぽーずする", romaji: "puropōzu suru" },
        { type: "I-Adj", icon: "🥺", en: "to want (thing ga)", kanji: "欲しい", kana: "ほしい", romaji: "hoshii" },
        { type: "Na-Adj", icon: "👠", en: "fashionable; stylish", kanji: "おしゃれ（な）", kana: "おしゃれ", romaji: "oshare" },
        { type: "Na-Adj", icon: "🪙❌", en: "stingy; cheap", kanji: "けち（な）", kana: "けち", romaji: "kechi" },
        { type: "Expression", icon: "👦", en: "Mr./Ms... (casual)", kanji: "〜くん", kana: "〜くん", romaji: "...kun" },
        { type: "Expression", icon: "👥", en: "[makes a noun plural] (e.g. wetashitachi)", kanji: "〜たち", kana: "〜たち", romaji: "...tachi" },
        { type: "Expression", icon: "🔍", en: "... like this; this kind of...", kanji: "こんな〜", kana: "こんな", romaji: "konna" },
        { type: "Expression", icon: "⚡", en: "suddenly", kanji: "急に", kana: "きゅうに", romaji: "kyūni" },
        { type: "Expression", icon: "🎯", en: "exactly", kanji: "ちょうど", kana: "ちょうど", romaji: "chōdo" },
        { type: "Expression", icon: "👍", en: "well", kanji: "よく", kana: "よく", romaji: "yoku" },
        { type: "Expression", icon: "🤷", en: "I am not sure...", kanji: "さあ", kana: "さあ", romaji: "sā" },
        { type: "Expression", icon: "❓💬", en: "what should one do", kanji: "どうしたらいい", kana: "どうしたらいい", romaji: "dō shitara ii" }
      ],
      counters: [
        { type: "Counter", icon: "📦", en: "[counter for smaller items]", kanji: "〜個", kana: "〜こ", romaji: "...ko" },
        { type: "Counter", icon: "📚", en: "[counter for bound volumes]", kanji: "〜冊", kana: "〜さつ", romaji: "...satsu" },
        { type: "Counter", icon: "🚗", en: "[counter for equipment/vehicles]", kanji: "〜台", kana: "〜だい", romaji: "...dai" },
        { type: "Counter", icon: "🐕", en: "[counter for smaller animals]", kanji: "〜匹", kana: "〜ひき", romaji: "...hiki" },
        { type: "Counter", icon: "✏️", en: "[counter for long objects]", kanji: "〜本", kana: "〜ほん", romaji: "...hon" }
      ]
    };

    let currentCategory = 'nouns1';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category; currentIndex = 0; isFlipped = false;
      const categories = ['nouns1', 'nouns2_verbs', 'adj_exp', 'counters'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white";
        } else {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50";
        }
      });
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    }

    function updateCard() {
      document.getElementById('flashcard').classList.remove('rotate-y-180'); isFlipped = false;
      const data = dataset[currentCategory][currentIndex];
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;
      document.getElementById('card-romaji').innerText = data.romaji;
      document.getElementById('card-type').innerText = data.type;
      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) { card.classList.add('rotate-y-180'); isFlipped = true; }
      else { card.classList.remove('rotate-y-180'); isFlipped = false; }
    }

    function nextCard() {
      if (currentIndex < dataset[currentCategory].length - 1) { currentIndex++; updateCard(); }
      else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }
    function prevCard() { if (currentIndex > 0) { currentIndex--; updateCard(); } }
    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden'); document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none'); currentIndex = 0; updateCard();
    }
    function speakText(event) {
      event.stopPropagation(); const data = dataset[currentCategory][currentIndex]; window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(data.kana.replace('〜','')); utterance.lang = 'ja-JP'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
    }
    window.onload = () => { document.getElementById('total-index').innerText = dataset[currentCategory].length; updateCard(); };
  </script>
</body>
</html>
