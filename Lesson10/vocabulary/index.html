<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 10 Vocabulary - 100% Full Complete</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-teal-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki L10 Vocab (57 Words Perfect)</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">100% Every Single Word from Lesson 10 (Seasons, Transport, Verbs)</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('nouns_1')" id="tab-nouns_1" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-teal-600 text-white">
        Nouns: Seasons & Travel (21)
      </button>
      <button onclick="switchCategory('verbs')" id="tab-verbs" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-teal-700 hover:bg-teal-50">
        Verbs (13)
      </button>
      <button onclick="switchCategory('expressions')" id="tab-expressions" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-teal-700 hover:bg-teal-50">
        Adj & Adverbs & Counter (23)
      </button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Word Count: <span id="current-index" class="text-teal-600">1</span> / <span id="total-index">21</span>
    </div>

    <div class="w-full max-w-2xl h-[500px] relative perspective-1000">
      
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-teal-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">🚄💨</div>
          <div id="card-en" class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-800 leading-snug">
            bullet train
          </div>
          <div class="text-xs text-teal-500 mt-8 font-semibold tracking-widest uppercase">Tap to see Japanese</div>
        </div>

        <div class="absolute w-full h-full bg-teal-50 rounded-3xl shadow-xl border-2 border-teal-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          
          <div class="w-full flex flex-col items-center pt-2 gap-1">
            <div id="card-en-back" class="text-xl md:text-2xl font-medium text-teal-800">
              bullet train
            </div>
            <div id="card-type" class="text-xs px-3 py-1 bg-slate-100 text-slate-800 font-bold rounded-full uppercase tracking-wider">
              Noun
            </div>
          </div>

          <div class="flex flex-col gap-3 my-auto w-full px-2">
            <div id="card-kanji" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-wide">
              新幹線
            </div>
            <div id="card-kana" class="text-2xl md:text-3xl text-teal-600 font-bold tracking-normal">
              しんかんせん
            </div>
            <div id="card-romaji" class="text-xl md:text-2xl text-amber-600 font-semibold tracking-wide italic">
              shinkansen
            </div>
          </div>

          <div class="pb-2">
            <button onclick="speakText(event)" class="bg-teal-600 hover:bg-teal-700 active:scale-95 text-white p-5 rounded-full shadow-lg transition-all duration-200 flex items-center justify-center group" title="Listen">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 group-hover:animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
              </svg>
            </button>
          </div>
        </div>

      </div>

      <div id="result-screen" class="absolute inset-0 bg-white rounded-3xl shadow-2xl border-4 border-teal-500 p-8 flex flex-col justify-center items-center text-center hidden z-10">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-4xl md:text-5xl font-black text-teal-600 mb-2">Ottimo!</h2>
        <p class="text-2xl text-slate-600 mb-8 font-medium">You completed this vocabulary set!</p>
        <button onclick="restartCategory()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold text-2xl px-8 py-4 rounded-full shadow-lg hover:shadow-xl transition-all active:scale-95">
          Restart
        </button>
      </div>

    </div>

    <div id="controls" class="flex items-center justify-center gap-6 mt-8 w-full max-w-md">
      <button onclick="prevCard()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95 disabled:opacity-30 disabled:pointer-events-none">
        ← Previous
      </button>
      <button onclick="nextCard()" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">
        Next →
      </button>
    </div>

  </main>

  <footer class="bg-slate-800 text-slate-400 py-4 text-center text-sm border-t border-slate-700">
    &copy; FujiGreentea - Japanese Vocabulary Master (Genki I)
  </footer>

  <script>
    const dataset = {
      // 1. 名詞：季節・移動・生活（21語）
      nouns_1: [
        { type: "Noun", icon: "🚄💨", en: "bullet train", kanji: "新幹線", kana: "しんかんせん", romaji: "shinkansen" },
        { type: "Noun", icon: "✈️🛫", en: "airplane", kanji: "飛行機", kana: "ひこうき", romaji: "hikōki" },
        { type: "Noun", icon: "🛳️🌊", en: "ship / boat", kanji: "船", kana: "ふね", romaji: "fune" },
        { type: "Noun", icon: "🚇🗺️", en: "subway", kanji: "地下鉄", kana: "ちかてつ", romaji: "chikatetsu" },
        { type: "Noun", icon: "🎫🧳", en: "reservation", kanji: "予約", kana: "よやく", romaji: "yoyaku" },
        { type: "Noun", icon: "ツアー🗺️", en: "tour", kanji: "ツアー", kana: "つあー", romaji: "tsuā" },
        { type: "Noun", icon: "🗺️🦁", en: "zoo", kanji: "動物園", kana: "どうぶつえん", romaji: "dōbutsuen" },
        { type: "Noun", icon: "⏳🌊", en: "presents / gifts", kanji: "プレゼント", kana: "ぷれぜんと", romaji: "purezento" },
        { type: "Noun", icon: "🎖️⚽", en: "activity / play", kanji: "アクティビティ", kana: "あくてぃびてぃ", romaji: "akutibiti" },
        { type: "Noun", icon: "🌅🌸", en: "spring", kanji: "春", kana: "はる", romaji: "haru" },
        { type: "Noun", icon: "☀️🏖️", en: "summer", kanji: "夏", kana: "なつ", romaji: "natsu" },
        { type: "Noun", icon: "🍁🍂", en: "autumn / fall", kanji: "秋", kana: "あき", romaji: "aki" },
        { type: "Noun", icon: "🥶❄️", en: "winter", kanji: "冬", kana: "ふゆ", romaji: "fuyu" },
        { type: "Noun", icon: "🗺️📍", en: "station", kanji: "駅", kana: "えき", romaji: "eki" },
        { type: "Noun", icon: "🏨🛋️", en: "inn (traditional Japanese style)", kanji: "旅館", kana: "りょかん", romaji: "ryokan" },
        { type: "Noun", icon: "🌊🐬", en: "aquarium", kanji: "水族館", kana: "すいぞくかん", romaji: "suizokukan" },
        { type: "Noun", icon: "⛺🌲", en: "camping", kanji: "キャンプ", kana: "きゃんぷ", romaji: "kyanpu" },
        { type: "Noun", icon: "🧥🧣", en: "gloves", kanji: "手袋", kana: "てぶくろ", romaji: "tebukuro" },
        { type: "Noun", icon: "💵🧴", en: "allowance / pocket money", kanji: "お小遣い", kana: "おこづかい", romaji: "okodukai" },
        { type: "Noun", icon: "📄🗂️", en: "schedule / plan", kanji: "予定", kana: "よてい", romaji: "yotei" },
        { type: "Noun", icon: "🧼🛀", en: "onsen (hot spring)", kanji: "温泉", kana: "おんせん", romaji: "onsen" }
      ],
      // 2. 動詞カテゴリー（13語）
      verbs: [
        { type: "U-Verb", icon: "🧗‍♂️🏔️", en: "to climb (e.g. mountain)", kanji: "登る", kana: "のぼる", romaji: "noboru" },
        { type: "U-Verb", icon: "🏨🛌", en: "to stay at (a hotel / inn)", kanji: "泊まる", kana: "とまる", romaji: "tomaru" },
        { type: "U-Verb", icon: "💵🤝", en: "to pay", kanji: "払う", kana: "はらう", romaji: "harau" },
        { type: "U-Verb", icon: "⚙️🤖", en: "to become customized / to decide on", kanji: "決める", kana: "きめる", romaji: "kimeru", type: "Ru-Verb" },
        { type: "U-Verb", icon: "📝🏁", en: "to practice", kanji: "練習する", kana: "れんしゅうする", romaji: "renshū suru", type: "Irregular-Verb" },
        { type: "U-Verb", icon: "🚶‍♂️🏫", en: "to walk", kanji: "歩く", kana: "あるく", romaji: "aruku" },
        { type: "U-Verb", icon: "🗺️🛫", en: "to ride / to board", kanji: "乗る", kana: "のる", romaji: "noru" },
        { type: "U-Verb", icon: "🧼🛀", en: "to take (a shower)", kanji: "浴びる", kana: "あびる", romaji: "abiru", type: "Ru-Verb" },
        { type: "U-Verb", icon: "🏃‍♂️🏁", en: "to clear up (weather)", kanji: "晴れる", kana: "はれる", romaji: "hareru", type: "Ru-Verb" },
        { type: "U-Verb", icon: "🔎💡", en: "to search / to look up", kanji: "調べる", kana: "しらべる", romaji: "shiraberu", type: "Ru-Verb" },
        { type: "U-Verb", icon: "🛒🎁", en: "to plan / to build (a schedule)", kanji: "計画を立てる", kana: "けいかくをたてる", romaji: "keikaku o tateru", type: "Ru-Verb" },
        { type: "Irregular-Verb", icon: "🧳🛫", en: "to travel", kanji: "旅行する", kana: "りょこうする", romaji: "ryokō suru" },
        { type: "Irregular-Verb", icon: "🤝✨", en: "to introduce", kanji: "紹介する", kana: "しょうかいする", romaji: "shōkai suru" }
      ],
      // 3. 形容詞・副詞・表現・助数詞（23語）
      expressions: [
        { type: "I-Adj", icon: "🏃‍♂️💨", en: "fast / early", kanji: "速い", kana: "はやい", romaji: "hayai" },
        { type: "I-Adj", icon: "🧣🛋️", en: "warm", kanji: "暖かい", kana: "あたたかい", romaji: "atatakai" },
        { type: "Na-Adj", icon: "👑✨", en: "famous", kanji: "有名（な）", kana: "ゆうめい", romaji: "yūmei" },
        { type: "Adverb", icon: "👑1️⃣", en: "the most / best", kanji: "一番", kana: "いちばん", romaji: "ichiban" },
        { type: "Expression", icon: "⚖️対", en: "by far / much more", kanji: "ずいぶん", kana: "ずいぶん", romaji: "zuibun" },
        { type: "Expression", icon: "🔄✨", en: "after all / as expected", kanji: "やっぱり", kana: "やっぱり", romaji: "yappari" },
        { type: "Adverb", icon: "📅⏭️", en: "next semester / term", kanji: "来学期", kana: "らいがっき", romaji: "raigakki" },
        { type: "Noun", icon: "🗺️🇯🇵", en: "world (geography focus)", kanji: "世界", kana: "せかい", romaji: "sekai" },
        { type: "Noun", icon: "💻✨", en: "internet", kanji: "インターネット", kana: "いんたーねっと", romaji: "intānetto" },
        { type: "Expression", icon: "🤷‍♂️💬", en: "which way / which one (polite)", kanji: "どちら / どっち", kana: "どちら", romaji: "dochira" },
        { type: "Expression", icon: "🛋️✨", en: "how (polite variant)", kanji: "いかが", kana: "いかが", romaji: "ikaga" },
        { type: "Expression", icon: "👍💬", en: "by all means / sure", kanji: "ぜひ", kana: "ぜひ", romaji: "zehi" },
        { type: "Expression", icon: "⏳✨", en: "soon", kanji: "もうすぐ", kana: "もうすぐ", romaji: "mō sugu" },
        { type: "Counter", icon: "🗓️🔢", en: "[counter for days]", kanji: "〜日", kana: "〜にち", romaji: "...nichi" },
        { type: "Counter", icon: "📅🔢", en: "[counter for weeks]", kanji: "〜週間", kana: "〜しゅうかん", romaji: "...shūkan" },
        { type: "Counter", icon: "🌙🔢", en: "[counter for months]", kanji: "〜ヶ月", kana: "〜かげつ", romaji: "...kagetsu" },
        { type: "Counter", icon: "🗓️🔢", en: "[counter for years]", kanji: "〜年", kana: "〜ねん", romaji: "...nen" },
        { type: "Expression", icon: "👥💬", en: "together / all together", kanji: "一緒に", kana: "いっしょに", romaji: "issho ni" },
        { type: "Expression", icon: "🤷‍♂️❌", en: "or / alternatively", kanji: "か", kana: "か", romaji: "ka" },
        { type: "Expression", icon: "🏢🗺️", en: "by means of / at", kanji: "で", kana: "で", romaji: "de" },
        { type: "Expression", icon: "🛫🗺️", en: "from...", kanji: "から", kana: "から", romaji: "kara" },
        { type: "Expression", icon: "🛑⏰", en: "until...", kanji: "まで", kana: "まで", romaji: "made" },
        { type: "Expression", icon: "🛌💤", en: "intend to do...", kanji: "〜つもり", kana: "〜つもり", romaji: "...tsumori" }
      ]
    };

    let currentCategory = 'nouns_1';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category;
      currentIndex = 0;
      isFlipped = false;
      
      const categories = ['nouns_1', 'verbs', 'expressions'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.classList.remove('bg-white', 'text-teal-700', 'hover:bg-teal-50');
          tab.classList.add('bg-teal-600', 'text-white');
        } else {
          tab.classList.remove('bg-teal-600', 'text-white');
          tab.classList.add('bg-white', 'text-teal-700', 'hover:bg-teal-50');
        }
      });

      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      
      document.getElementById('total-index').innerText = dataset[currentCategory].length;

      updateCard();
    }

    function updateCard() {
      const card = document.getElementById('flashcard');
      card.classList.remove('rotate-y-180');
      isFlipped = false;

      const data = dataset[currentCategory][currentIndex];
      
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;
      document.getElementById('card-romaji').innerText = data.romaji;
      
      const typeLabel = document.getElementById('card-type');
      typeLabel.innerText = data.type;
      if (data.type.includes('Verb')) {
        typeLabel.className = "text-xs px-3 py-1 bg-amber-100 text-amber-800 font-bold rounded-full uppercase tracking-wider";
      } else if (data.type.includes('Adj')) {
        typeLabel.className = "text-xs px-3 py-1 bg-purple-100 text-purple-800 font-bold rounded-full uppercase tracking-wider";
      } else {
        typeLabel.className = "text-xs px-3 py-1 bg-slate-100 text-slate-800 font-bold rounded-full uppercase tracking-wider";
      }

      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) {
        card.classList.add('rotate-y-180');
        isFlipped = true;
      } else {
        card.classList.remove('rotate-y-180');
        isFlipped = false;
      }
    }

    function nextCard() {
      const totalQuestions = dataset[currentCategory].length;
      if (currentIndex < totalQuestions - 1) {
        currentIndex++;
        updateCard();
      } else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        updateCard();
      }
    }

    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      currentIndex = 0;
      updateCard();
    }

    function speakText(event) {
      event.stopPropagation();
      const data = dataset[currentCategory][currentIndex];
      window.speechSynthesis.cancel();
      
      let textToSpeak = data.kana.split('/')[0].replace(/（.*）/g, '').replace(/\(.*\)/g, '').replace('〜', '').trim();
      
      const utterance = new SpeechSynthesisUtterance(textToSpeak);
      utterance.lang = 'ja-JP';
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
    }

    window.onload = () => {
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    };
  </script>
</body>
</html>
