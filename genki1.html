<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENKI 1 Lessons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; }
        .header { background-color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: #4a86e8; font-size: 20px; }
        .button-group { display: flex; gap: 10px; }
        .btn { flex: 1; text-align: center; text-decoration: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; }
        .btn-go { background-color: #4a86e8; } /* 青色 */
        .btn-vocab { background-color: #f6b26b; } /* オレンジ色 */
        .btn i { margin-right: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2><i class="fas fa-book"></i> GENKI 1 (第1課〜第12課)</h2>
</div>

<div class="grid">
    <div class="card">
        <h3>Lesson 1</h3>
        <div class="button-group">
            <a href="./Lesson1/" class="btn btn-go"><i class="fas fa-external-link-alt"></i> GO</a>
            <a href="./Lesson1/vocab.html" class="btn btn-vocab"><i class="fas fa-th-large"></i> VOCAB</a>
        </div>
    </div>
    <div class="card">
        <h3>Lesson 2</h3>
        <div class="button-group">
            <a href="./Lesson2/" class="btn btn-go"><i class="fas fa-external-link-alt"></i> GO</a>
            <a href="./Lesson2/vocab.html" class="btn btn-vocab"><i class="fas fa-th-large"></i> VOCAB</a>
        </div>
    </div>
    <div class="card">
        <h3>Lesson 3</h3>
        <div class="button-group">
            <a href="./Lesson3/" class="btn btn-go"><i class="fas fa-external-link-alt"></i> GO</a>
            <a href="./Lesson3/vocab.html" class="btn btn-vocab"><i class="fas fa-th-large"></i> VOCAB</a>
        </div>
    </div>
</div>

</body>
</html>
