<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 21 Sentence Practice</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-rose-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki L21 Sentence Master 🎨</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">Focus: Passive Verbs, Time Clauses (~no aidani), Making Changes (Adj + suru), Requesting Actions (~te hoshii)</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('passive')" id="tab-passive" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-rose-600 text-white">Passive Verbs (5)</button>
      <button onclick="switchCategory('time_clauses')" id="tab-time_clauses" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-white text-rose-700 hover:bg-rose-50">While doing (~no aidani) (5)</button>
      <button onclick="switchCategory('changes_desires')" id="tab-changes_desires" class="px-5 py-3 rounded-full font-bold text-lg shadow-sm transition-all duration-300 bg-white text-rose-700 hover:bg-rose-50">Changes & Desires (5)</button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Sentence: <span id="current-index" class="text-rose-600">1</span> / <span id="total-index">5</span>
    </div>

    <div class="w-full max-w-2xl h-[450px] relative perspective-1000">
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-rose-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">🥷🚗😭</div>
          <div id="card-en" class="text-2xl md:text-3xl font-bold text-slate-800 leading-snug">I had my car stolen by a thief.</div>
          <div class="text-xs text-rose-500 mt-8 font-semibold tracking-widest uppercase">Tap to see Japanese Answer</div>
        </div>

        <div class="absolute w-full h-full bg-rose-50 rounded-3xl shadow-xl border-2 border-rose-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          <div class="w-full flex flex-col items-center pt-2">
            <div id="card-en-back" class="text-lg md:text-xl font-medium text-rose-800">I had my car stolen by a thief.</div>
          </div>
          <div class="flex flex-col gap-3 my-auto w-full px-2">
            <div id="card-kanji" class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-slate-900 leading-relaxed">私は泥棒に車を盗まれました。</div>
            <div id="card-kana" class="text-xl md:text-2xl text-rose
