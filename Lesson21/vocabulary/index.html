<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 21 Vocabulary App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-indigo-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki L21 Vocab (Full Complete) 🚨</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">100% Every Single Word & Expression from Lesson 21</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('nouns1')" id="tab-nouns1" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white">Nouns: Trouble & Life (15)</button>
      <button onclick="switchCategory('nouns2_adj')" id="tab-nouns2_adj" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Nouns 2 & Adj (11)</button>
      <button onclick="switchCategory('verbs')" id="tab-verbs" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">All Verbs (14)</button>
      <button onclick="switchCategory('expressions')" id="tab-expressions" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Adverbs & Phrases (7)</button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Word Count: <span id="current-index" class="text-indigo-600">1</span> / <span id="total-index">15</span>
    </div>

    <div class="w-full max-w-2xl h-[500px] relative perspective-1000">
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-indigo-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">🥷🕵️‍♂️</div>
          <div id="card-en" class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-800 leading-snug">burglar; thief</div>
          <div class="text-xs text-indigo-500 mt-8 font-semibold tracking-widest uppercase">Tap to see Japanese</div>
        </div>

        <div class="absolute w-full h-full bg-indigo-50 rounded-3xl shadow-xl border-2 border-indigo-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          <div class="w-full flex flex-col items-center pt-2 gap-1">
            <div id="card-en-back" class="text-xl md:text-2xl font-medium text-indigo-800">burglar; thief</div>
            <div id="card-type" class="text-xs px-3 py-1 bg-slate-100 text-slate-800 font-bold rounded-full uppercase tracking-wider">Noun</div>
          </div>
          <div class="flex flex-col gap-3 my-auto w-full px-2">
            <div id="card-kanji" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-wide">泥棒</div>
            <div id="card-kana" class="text-2xl md:text-3xl text-indigo-600 font-bold">どろぼう</div>
            <div id="card-romaji" class="text-xl md:text-2xl text-amber-600 font-semibold italic">dorobō</div>
          </div>
          <div class="pb-2">
            <button onclick="speakText(event)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white p-5 rounded-full shadow-lg flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
          </div>
        </div>

      </div>

      <div id="result-screen" class="absolute inset-0 bg-white rounded-3xl shadow-2xl border-4 border-indigo-500 p-8 flex flex-col justify-center items-center text-center hidden z-10">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-4xl md:text-5xl font-black text-indigo-600 mb-2">Great Job!</h2>
        <p class="text-2xl text-slate-600 mb-8 font-medium">You completed this vocabulary set!</p>
        <button onclick="restartCategory()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-2xl px-8 py-4 rounded-full shadow-lg active:scale-95">Restart</button>
      </div>
    </div>

    <div id="controls" class="flex items-center justify-center gap-6 mt-8 w-full max-w-md">
      <button onclick="prevCard()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">← Previous</button>
      <button onclick="nextCard()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">Next →</button>
    </div>

  </main>

  <script>
    const dataset = {
      nouns1: [
        { type: "Noun", icon: "🥷🕵️‍♂️", en: "burglar; thief", kanji: "泥棒", kana: "どろぼう", romaji: "dorobō" },
        { type: "Noun", icon: "🚓👮‍♂️", en: "police; police station", kanji: "警察", kana: "けいさつ", romaji: "keisatsu" },
        { type: "Noun", icon: "先輩", en: "senior member (of a group)", kanji: "先輩", kana: "せんぱい", romaji: "senpai" },
        { type: "Noun", icon: "後輩", en: "junior member (of a group)", kanji: "後輩", kana: "こうはい", romaji: "kōhai" },
        { type: "Noun", icon: "🧑‍💼🏢", en: "president of a company", kanji: "社長", kana: "しゃちょう", romaji: "shachō" },
        { type: "Noun", icon: "💼💬", en: "business interview", kanji: "面接", kana: "めんせつ", romaji: "mensetsu" },
        { type: "Noun", icon: "☎️📻", en: "answering machine", kanji: "留守番電話", kana: "るすばんでんわ", romaji: "rusubandenwa" },
        { type: "Noun", icon: "🏪🛍️", en: "convenience store", kanji: "コンビニ", kana: "こんびに", romaji: "konbini" },
        { type: "Noun", icon: "💵📉", en: "gratuity; tip", kanji: "チップ", kana: "ちっぷ", romaji: "chippu" },
        { type: "Noun", icon: "🧒🎒", en: "elementary school", kanji: "小学校", kana: "しょうがっこう", romaji: "shōgakkō" },
        { type: "Noun", icon: "🏫✏️", en: "cram school", kanji: "塾", kana: "じゅく", romaji: "juku" },
        { type: "Noun", icon: "🗣️🎶", en: "speech", kanji: "スピーチ", kana: "すぴーち", romaji: "supīchi" },
        { type: "Noun", icon: "📊📉", en: "noon; daytime", kanji: "昼間", kana: "ひるま", romaji: "hiruma" },
        { type: "Noun", icon: "🌏🗺️", en: "abroad; overseas", kanji: "海外", kana: "かいがい", romaji: "kaigai" },
        { type: "Noun", icon: "🗺️📍", en: "place", kanji: "場所", kana: "ばしょ", romaji: "basho" }
      ],
      nouns2_adj: [
        { type: "Noun", icon: "📋🏷️", en: "schedule; program", kanji: "予定", kana: "よてい", romaji: "yotei" },
        { type: "Noun", icon: "🦕🛏️", en: "monster", kanji: "怪獣", kana: "かいじゅう", romaji: "kaijū" },
        { type: "Noun", icon: "🦖🏯", en: "capital", kanji: "首都", kana: "しゅと", romaji: "shuto" },
        { type: "Noun", icon: "📜🖋️", en: "living things", kanji: "生物", kana: "せいぶつ", romaji: "seibutsu" },
        { type: "Noun", icon: "🌱🏞️", en: "environment", kanji: "環境", kana: "かんきょう", romaji: "kankyō" },
        { type: "Noun", icon: "🗳️", en: "election", kanji: "選挙", kana: "せんきょ", romaji: "senkyo" },
        { type: "Noun", icon: "💵✨", en: "tuition", kanji: "授業料", kana: "じゅぎょうりょう", romaji: "jugyōryō" },
        { type: "I-Adj", icon: "🤢", en: "painful; hard", kanji: "つらい", kana: "つらい", romaji: "tsurai" },
        { type: "Na-Adj", icon: "🌍", en: "international", kanji: "国際的（な）", kana: "こくさいてき", romaji: "kokusaiteki" },
        { type: "Na-Adj", icon: "🦥🛌", en: "safe", kanji: "安全（な）", kana: "あんぜん", romaji: "anzen" },
        { type: "Na-Adj", icon: "❌🛑", en: "messy; disorganized", kanji: "めちゃくちゃ（な）", kana: "めちゃくちゃ", romaji: "mechakucha" }
      ],
      verbs: [
        { type: "U-Verb", icon: "📱💧", en: "to insult / to bad-mouth (~o)", kanji: "悪口を言う", kana: "わるぐちをいう", romaji: "waruguchi o iu" },
        { type: "U-Verb", icon: "🥷🎒", en: "to steal (~o)", kanji: "泥棒する / 盗む", kana: "ぬすむ", romaji: "nusumu" },
        { type: "U-Verb", icon: "📌", en: "to choose; to select (~o)", kanji: "選ぶ", kana: "えらぶ", romaji: "erabu" },
        { type: "U-Verb", icon: "🚶‍♂️🌧️", en: "to step on (~o)", kanji: "踏む", kana: "ふむ", romaji: "fumu" },
        { type: "U-Verb", icon: "💔🚪", en: "to reject (someone); to turn down (~o)", kanji: "振る", kana: "ふる", romaji: "furu" },
        { type: "U-Verb", icon: "🖨️📄", en: "to print (~o)", kanji: "プリントする", kana: "ぷりんとする", romaji: "purintosuru" },
        { type: "Ru-Verb", icon: "👍🌟", en: "to praise; to compliment (~o)", kanji: "褒める", kana: "ほめる", romaji: "homeru" },
        { type: "Ru-Verb", icon: "⏰🛌", en: "to wake (someone) up (~o)", kanji: "起こす", kana: "おこす", romaji: "okosu" },
        { type: "Ru-Verb", icon: "🤢💥", en: "to make something dirty (~o)", kanji: "汚す", kana: "よごす", romaji: "yogosu" },
        { type: "Ru-Verb", icon: "🧎‍♂️🪑", en: "to lock (~ni)", kanji: "鍵をかける", kana: "かぎをかける", romaji: "kagi o kakeru" },
        { type: "Ru-Verb", icon: "🤝🌟", en: "to help; to save (~o)", kanji: "助ける", kana: "たすける", romaji: "tasukeru" },
        { type: "Irreg-Verb", icon: "🙏🎤", en: "to treat (someone) to a meal", kanji: "ごちそうする", kana: "ごちそうする", romaji: "gochisōsuru" },
        { type: "Irreg-Verb", icon: "💼🎙️", en: "to prepare (~o)", kanji: "準備する", kana: "じゅんびする", romaji: "junbisuru" },
        { type: "Irreg-Verb", icon: "🤖⚙️", en: "to bully (~o)", kanji: "いじめる", kana: "いじめる", romaji: "ijimeru" }
      ],
      expressions: [
        { type: "Expression", icon: "⏳🛑", en: "anyway; at any rate", kanji: "とにかく", kana: "とにかく", romaji: "tonikaku" },
        { type: "Expression", icon: "⏳📊", en: "while...; during...", kanji: "〜の間に", kana: "〜のあいだに", romaji: "...no aidani" },
        { type: "Expression", icon: "📏", en: "about this much", kanji: "これぐらい", kana: "これぐらい", romaji: "kore gurai" },
        { type: "Expression", icon: "🙋‍♂️", en: "oneself", kanji: "自分", kana: "じぶん", romaji: "jibun" },
        { type: "Expression", icon: "🔄", en: "other", kanji: "他の", kana: "ほかの", romaji: "hoka no" },
        { type: "Expression", icon: "🤔💭", en: "in fact; originally", kanji: "実は", kana: "じつは", romaji: "jitsu wa" },
        { type: "Expression", icon: "🎉✨", en: "Thanks to... (~の好意で)", kanji: "〜のおかげで", kana: "〜のおかげで", romaji: "...no okagede" }
      ]
    };

    let currentCategory = 'nouns1';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category; currentIndex = 0; isFlipped = false;
      const categories = ['nouns1', 'nouns2_adj', 'verbs', 'expressions'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white";
        } else {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50";
        }
      });
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    }

    function updateCard() {
      document.getElementById('flashcard').classList.remove('rotate-y-180'); isFlipped = false;
      const data = dataset[currentCategory][currentIndex];
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;
      document.getElementById('card-romaji').innerText = data.romaji;
      document.getElementById('card-type').innerText = data.type;
      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) { card.classList.add('rotate-y-180'); isFlipped = true; }
      else { card.classList.remove('rotate-y-180'); isFlipped = false; }
    }

    function nextCard() {
      if (currentIndex < dataset[currentCategory].length - 1) { currentIndex++; updateCard(); }
      else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }
    function prevCard() { if (currentIndex > 0) { currentIndex--; updateCard(); } }
    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden'); document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none'); currentIndex = 0; updateCard();
    }
    function speakText(event) {
      event.stopPropagation(); const data = dataset[currentCategory][currentIndex]; window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(data.kana.replace('（れんず）','').replace('（な）','').replace('〜','')); utterance.lang = 'ja-JP'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
    }
    window.onload = () => { document.getElementById('total-index').innerText = dataset[currentCategory].length; updateCard(); };
  </script>
</body>
</html>
