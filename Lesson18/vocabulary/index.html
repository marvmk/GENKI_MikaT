<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 18 Vocabulary App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
  </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col justify-between">

  <header class="bg-indigo-600 text-white py-6 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-extrabold tracking-wide">Genki L18 Vocab (Full Complete) 🧹</h1>
    <p class="text-sm md:text-base mt-2 opacity-90">100% Every Single Word & Expression from Lesson 18</p>
  </header>

  <main class="max-w-4xl w-full mx-auto p-4 flex-grow flex flex-col items-center justify-center">
    
    <div id="tabs" class="w-full flex flex-wrap justify-center gap-2 mb-6">
      <button onclick="switchCategory('nouns1')" id="tab-nouns1" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white">Nouns: Social & Life (13)</button>
      <button onclick="switchCategory('nouns2_adj')" id="tab-nouns2_adj" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Nouns 2 & Adj (11)</button>
      <button onclick="switchCategory('verbs')" id="tab-verbs" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">All Verbs (14)</button>
      <button onclick="switchCategory('expressions')" id="tab-expressions" class="px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50">Adverbs & Phrases (9)</button>
    </div>

    <div class="text-xl md:text-2xl font-bold text-slate-600 mb-4">
      Word Count: <span id="current-index" class="text-indigo-600">1</span> / <span id="total-index">13</span>
    </div>

    <div class="w-full max-w-2xl h-[500px] relative perspective-1000">
      <div id="flashcard" onclick="flipCard()" class="w-full h-full relative transform-style-3d transition-transform duration-500 cursor-pointer">
        
        <div class="absolute w-full h-full bg-white rounded-3xl shadow-xl border-2 border-indigo-100 p-8 flex flex-col justify-center items-center text-center backface-hidden">
          <div id="card-icon" class="text-7xl md:text-8xl mb-6 select-none">👋🥂</div>
          <div id="card-en" class="text-3xl md:text-4xl lg:text-5xl font-bold text-slate-800 leading-snug">farewell party</div>
          <div class="text-xs text-indigo-500 mt-8 font-semibold tracking-widest uppercase">Tap to see Japanese</div>
        </div>

        <div class="absolute w-full h-full bg-indigo-50 rounded-3xl shadow-xl border-2 border-indigo-200 p-6 flex flex-col justify-between items-center text-center backface-hidden rotate-y-180">
          <div class="w-full flex flex-col items-center pt-2 gap-1">
            <div id="card-en-back" class="text-xl md:text-2xl font-medium text-indigo-800">farewell party</div>
            <div id="card-type" class="text-xs px-3 py-1 bg-slate-100 text-slate-800 font-bold rounded-full uppercase tracking-wider">Noun</div>
          </div>
          <div class="flex flex-col gap-3 my-auto w-full px-2">
            <div id="card-kanji" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-wide">送別会</div>
            <div id="card-kana" class="text-2xl md:text-3xl text-indigo-600 font-bold">そうべつかい</div>
            <div id="card-romaji" class="text-xl md:text-2xl text-amber-600 font-semibold italic">sōbetsukai</div>
          </div>
          <div class="pb-2">
            <button onclick="speakText(event)" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white p-5 rounded-full shadow-lg flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
          </div>
        </div>

      </div>

      <div id="result-screen" class="absolute inset-0 bg-white rounded-3xl shadow-2xl border-4 border-indigo-500 p-8 flex flex-col justify-center items-center text-center hidden z-10">
        <div class="text-7xl mb-4">🎉</div>
        <h2 class="text-4xl md:text-5xl font-black text-indigo-600 mb-2">Great Job!</h2>
        <p class="text-2xl text-slate-600 mb-8 font-medium">You completed this vocabulary set!</p>
        <button onclick="restartCategory()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-2xl px-8 py-4 rounded-full shadow-lg active:scale-95">Restart</button>
      </div>
    </div>

    <div id="controls" class="flex items-center justify-center gap-6 mt-8 w-full max-w-md">
      <button onclick="prevCard()" class="flex-1 bg-slate-700 hover:bg-slate-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">← Previous</button>
      <button onclick="nextCard()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-all active:scale-95">Next →</button>
    </div>

  </main>

  <script>
    const dataset = {
      nouns1: [
        { type: "Noun", icon: "👋🥂", en: "farewell party", kanji: "送別会", kana: "そうべつかい", romaji: "sōbetsukai" },
        { type: "Noun", icon: "🌸🎓", en: "welcome party", kanji: "歓迎会", kana: "かんげいかい", romaji: "kangeikai" },
        { type: "Noun", icon: "🤝🏢", en: "business; errand", kanji: "用事", kana: "ようじ", romaji: "yōji" },
        { type: "Noun", icon: "🥋🏯", en: "martial arts", kanji: "武道", kana: "ぶどう", romaji: "budō" },
        { type: "Noun", icon: "🧒🏥", en: "pediatrics", kanji: "小児科", kana: "しょうにか", romaji: "shōnika" },
        { type: "Noun", icon: "🏥💊", en: "dermatology", kanji: "皮膚科", kana: "ひふか", romaji: "hifuka" },
        { type: "Noun", icon: "🏥🩺", en: "surgery", kanji: "外科", kana: "げか", romaji: "geka" },
        { type: "Noun", icon: "🦷🏥", en: "dentist", kanji: "歯医者", kana: "はいしゃ", romaji: "haisha" },
        { type: "Noun", icon: "🧾⚖️", en: "insurance card", kanji: "保険証", kana: "ほけんしょう", romaji: "hokenshō" },
        { type: "Noun", icon: "🟪🌿", en: "iris (flower)", kanji: "あやめ", kana: "あやめ", romaji: "ayame" },
        { type: "Noun", icon: "市", en: "city", kanji: "市", kana: "し", romaji: "shi" },
        { type: "Noun", icon: "🧑‍🏫🏢", en: "city hall", kanji: "市役所", kana: "しやくしょ", romaji: "shiyakusho" },
        { type: "Noun", icon: "🚶‍♂️🏞️", en: "walk; stroll", kanji: "散歩", kana: "さんぽ", romaji: "sanpo" }
      ],
      nouns2_adj: [
        { type: "Noun", icon: "🪟🧹", en: "spring cleaning; big cleaning", kanji: "大掃除", kana: "おおそうじ", romaji: "ōsōji" },
        { type: "Noun", icon: "☁️🌬️", en: "cloud", kanji: "雲", kana: "くも", romaji: "kumo" },
        { type: "Noun", icon: "☠️🧪", en: "poison", kanji: "毒", kana: "どく", romaji: "doku" },
        { type: "Noun", icon: "🛸👽", en: "UFO", kanji: "ユーフォー", kana: "ゆーふぉー", romaji: "yūfō" },
        { type: "Noun", icon: "🦖🔥", en: "Godzilla", kanji: "ゴジラ", kana: "ごじら", romaji: "gojira" },
        { type: "I-Adj", icon: "🌶️🥵", en: "painful; bitter; heart-breaking", kanji: "つらい", kana: "つらい", romaji: "tsurai" },
        { type: "I-Adj", icon: "広", en: "wide; spacious", kanji: "広い", kana: "ひろい", romaji: "hiroi" },
        { type: "I-Adj", icon: "🛒📉", en: "cheap (price)", kanji: "安い", kana: "やすい", romaji: "yasui" },
        { type: "I-Adj", icon: "🙎‍♂️👍", en: "good; nice (informal: よい)", kanji: "いい", kana: "いい", romaji: "ii" },
        { type: "Na-Adj", icon: "🤝✨", en: "polite; courteous; careful", kanji: "丁寧（な）", kana: "ていねい", romaji: "teinei" },
        { type: "Na-Adj", icon: "🌿💎", en: "luxurious; gorgeous", kanji: "豪華（な）", kana: "ごうか", romaji: "gōka" }
      ],
      verbs: [
        { type: "U-Verb", icon: "🧼🧺", en: "to wash (~o)", kanji: "洗う", kana: "あらう", romaji: "arau" },
        { type: "U-Verb", icon: "🧩🔍", en: "to look for; to find (~o)", kanji: "探す", kana: "さがす", romaji: "sagasu" },
        { type: "U-Verb", icon: "🚶‍♂️🐕", en: "to take a walk", kanji: "散歩する", kana: "さんぽする", romaji: "sanposuru" },
        { type: "U-Verb", icon: "🧎‍♀️", en: "to sit down (seat ni)", kanji: "座る", kana: "すわる", romaji: "suwaru" },
        { type: "U-Verb", icon: "🚬💨", en: "to smoke a cigarette", kanji: "たばこを吸う", kana: "たばこをすう", romaji: "tabako o sū" },
        { type: "U-Verb", icon: "🤝📞", en: "to be connected; to reach (~ni)", kanji: "つながる", kana: "つながる", romaji: "tsunagaru" },
        { type: "U-Verb", icon: "🧱🏃‍♂️", en: "to pass through; to go through (~o)", kanji: "通る", kana: "とおる", romaji: "tōru" },
        { type: "U-Verb", icon: "🎒🚪", en: "to leave (something) behind (~o)", kanji: "忘れる", kana: "わすれる", romaji: "wasureru" },
        { type: "Ru-Verb", icon: "🧺✨", en: "to clean up; to tidy up (~o)", kanji: "片付ける", kana: "かたづける", romaji: "katadukeru" },
        { type: "Ru-Verb", icon: "🧽🛁", en: "to clear up; to become clean (~ga)", kanji: "片付く", kana: "かたづく", romaji: "kataduku" },
        { type: "Ru-Verb", icon: "🧴🚿", en: "to apply medicine; to paint (~o)", kanji: "塗る", kana: "ぬる", romaji: "nuru" },
        { type: "Ru-Verb", icon: "🧎‍♂️🆙", en: "to stand up", kanji: "立つ", kana: "たつ", romaji: "tatsu" },
        { type: "Irreg-Verb", icon: "🏥✍️", en: "to see a doctor; to be hospitalized", kanji: "入院する", kana: "にゅういんする", romaji: "nyūinsuru" },
        { type: "Irreg-Verb", icon: "🥳🤝", en: "to hold a party", kanji: "パーティーを開く", kana: "ぱーてぃーをひらく", romaji: "pātī o hiraku" }
      ],
      expressions: [
        { type: "Expression", icon: "⏳🏁", en: "by (time limit)", kanji: "〜までに", kana: "〜までに", romaji: "...madeni" },
        { type: "Adverb", icon: "🌱⚡", en: "as much as possible", kanji: "できるだけ", kana: "できるだけ", romaji: "dekirudake" },
        { type: "Adverb", icon: "⏳⏪", en: "originally; from the start", kanji: "もともと", kana: "もともと", romaji: "motomoto" },
        { type: "Expression", icon: "💬🌟", en: "according to...", kanji: "〜によると", kana: "〜によると", romaji: "...ni yoruto" },
        { type: "Expression", icon: "🤝📞", en: "Hello? (on the phone)", kanji: "もしもし", kana: "もしもし", romaji: "moshimoshi" },
        { type: "Expression", icon: "🏡🌱", en: "by the way", kanji: "ところで", kana: "ところで", romaji: "tokorode" },
        { type: "Expression", icon: "≠📊", en: "on the contrary; rather", kanji: "かえって", kana: "かえって", romaji: "kaette" },
        { type: "Expression", icon: "🙎‍♂️💬", en: "Is that so? (polite)", kanji: "そうですか", kana: "そうですか", romaji: "sōdesuka" },
        { type: "Expression", icon: "🙏💨", en: "Thank you for your hard work.", kanji: "お疲れ様でした", kana: "おつかれさまでした", romaji: "otsukaresamadeshita" }
      ]
    };

    let currentCategory = 'nouns1';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category; currentIndex = 0; isFlipped = false;
      const categories = ['nouns1', 'nouns2_adj', 'verbs', 'expressions'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white";
        } else {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50";
        }
      });
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    }

    function updateCard() {
      document.getElementById('flashcard').classList.remove('rotate-y-180'); isFlipped = false;
      const data = dataset[currentCategory][currentIndex];
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;
      document.getElementById('card-romaji').innerText = data.romaji;
      document.getElementById('card-type').innerText = data.type;
      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) { card.classList.add('rotate-y-180'); isFlipped = true; }
      else { card.classList.remove('rotate-y-180'); isFlipped = false; }
    }

    function nextCard() {
      if (currentIndex < dataset[currentCategory].length - 1) { currentIndex++; updateCard(); }
      else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }
    function prevCard() { if (currentIndex > 0) { currentIndex--; updateCard(); } }
    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden'); document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none'); currentIndex = 0; updateCard();
    }
    function speakText(event) {
      event.stopPropagation(); const data = dataset[currentCategory][currentIndex]; window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(data.kana.replace('（な）','').replace('（レンズ）','').replace('〜','')); utterance.lang = 'ja-JP'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
    }
    window.onload = () => { document.getElementById('total-index').innerText = dataset[currentCategory].length; updateCard(); };
  </script>
</body>
</html>
