      ]
    };

    let currentCategory = 'nouns';
    let currentIndex = 0;
    let isFlipped = false;

    function switchCategory(category) {
      currentCategory = category; currentIndex = 0; isFlipped = false;
      const categories = ['nouns', 'honorific_verbs', 'standard_verbs', 'expressions'];
      categories.forEach(cat => {
        const tab = document.getElementById(`tab-${cat}`);
        if (cat === category) {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-indigo-600 text-white";
        } else {
          tab.className = "px-4 py-2.5 rounded-full font-bold text-base shadow-sm transition-all duration-300 bg-white text-indigo-700 hover:bg-indigo-50";
        }
      });
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none');
      document.getElementById('total-index').innerText = dataset[currentCategory].length;
      updateCard();
    }

    function updateCard() {
      document.getElementById('flashcard').classList.remove('rotate-y-180'); isFlipped = false;
      const data = dataset[currentCategory][currentIndex];
      document.getElementById('card-icon').innerText = data.icon;
      document.getElementById('card-en').innerText = data.en;
      document.getElementById('card-en-back').innerText = data.en;
      document.getElementById('card-kanji').innerText = data.kanji;
      document.getElementById('card-kana').innerText = data.kana;
      document.getElementById('card-romaji').innerText = data.romaji;
      document.getElementById('card-type').innerText = data.type;
      document.getElementById('current-index').innerText = currentIndex + 1;
    }

    function flipCard() {
      const card = document.getElementById('flashcard');
      if (!isFlipped) { card.classList.add('rotate-y-180'); isFlipped = true; }
      else { card.classList.remove('rotate-y-180'); isFlipped = false; }
    }

    function nextCard() {
      if (currentIndex < dataset[currentCategory].length - 1) { currentIndex++; updateCard(); }
      else {
        document.getElementById('flashcard').classList.add('hidden');
        document.getElementById('controls').classList.add('opacity-30', 'pointer-events-none');
        document.getElementById('result-screen').classList.remove('hidden');
      }
    }
    function prevCard() { if (currentIndex > 0) { currentIndex--; updateCard(); } }
    function restartCategory() {
      document.getElementById('result-screen').classList.add('hidden'); document.getElementById('flashcard').classList.remove('hidden');
      document.getElementById('controls').classList.remove('opacity-30', 'pointer-events-none'); currentIndex = 0; updateCard();
    }
    function speakText(event) {
      event.stopPropagation(); const data = dataset[currentCategory][currentIndex]; window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(data.kana.replace('пјҲгҒӘпјү','').replace('гҖң','')); utterance.lang = 'ja-JP'; utterance.rate = 0.85; window.speechSynthesis.speak(utterance);
    }
    window.onload = () => { document.getElementById('total-index').innerText = dataset[currentCategory].length; updateCard(); };
  </script>
</body>
</html>
